# Repository labels configuration
# Applied by the "Setup Labels" workflow using EndBug/label-sync@v2
# Run the workflow manually (Actions → Setup Labels → Run workflow) after merging this PR.

# ─── Type labels ─────────────────────────────────────────────────────────────
- name: "type:epic"
  color: "6e40c9"
  description: "Large strategic initiative spanning multiple Features/Tasks"

- name: "type:feature"
  color: "0075ca"
  description: "User-facing or system capability that delivers value"

- name: "type:task"
  color: "e4e669"
  description: "Concrete implementation step (hours to 1-2 days)"

- name: "type:bug"
  color: "d73a4a"
  description: "Something broken or not working as expected"

# ─── Priority labels ─────────────────────────────────────────────────────────
- name: "priority:p0"
  color: "b60205"
  description: "Critical – production down, fix immediately"

- name: "priority:p1"
  color: "e11d48"
  description: "High – fix in current sprint"

- name: "priority:p2"
  color: "f97316"
  description: "Medium – fix in next sprint"

- name: "priority:p3"
  color: "94a3b8"
  description: "Low – fix when capacity allows"

# ─── Status labels ────────────────────────────────────────────────────────────
- name: "status:blocked"
  color: "ee0701"
  description: "Cannot proceed; waiting on dependency or decision"

- name: "status:ready"
  color: "0e8a16"
  description: "Refined and ready to be picked up"

- name: "status:in-progress"
  color: "1d76db"
  description: "Actively being worked on"

- name: "status:needs-review"
  color: "e4e669"
  description: "Awaiting code review or stakeholder sign-off"
