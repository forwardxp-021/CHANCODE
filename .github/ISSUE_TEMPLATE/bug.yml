name: "Bug"
description: "Something is broken or not working as expected."
title: "[BUG] "
labels: ["type:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: "One sentence describing the bug."
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: "What should happen?"
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: "What actually happens? Include error messages or screenshots if available."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "OS, browser/runtime version, app version, commit SHA, relevant config."
      placeholder: |
        - OS: 
        - Browser / Runtime: 
        - App version / commit: 
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Impact / Severity
      description: "Who is affected? How often does it occur? Is there a workaround?"
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: "Logs, stack traces, related issues, or anything else that helps diagnose the bug."
    validations:
      required: false
